<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析系统</title>
</head>
<body>
    <h1>股票分析系统 - 简易版</h1>
    
    <div id="status">
        <h2>后端API状态</h2>
        <p>API地址: http://localhost:5000</p>
        <button onclick="checkAPI()">检查API状态</button>
        <p id="apiStatus"></p>
    </div>

    <div id="data">
        <h2>股票数据</h2>
        <button onclick="fetchData()">获取每日分析</button>
        <button onclick="fetchPredictions()">获取AI预测</button>
        <button onclick="fetchSuggestions()">获取选股建议</button>
        <div id="dataOutput"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        function checkAPI() {
            fetch(`${API_URL}/health`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('apiStatus').innerHTML = 
                        `状态: ${data.status} | 版本: ${data.version} | 时间: ${data.timestamp}`;
                })
                .catch(error => {
                    document.getElementById('apiStatus').innerHTML = 
                        `API连接失败: ${error.message}`;
                });
        }
        
        function fetchData() {
            fetch(`${API_URL}/stock/daily`)
                .then(response => response.json())
                .then(data => {
                    const output = data.data.map(item => `
                        <div style="margin: 10px; padding: 10px; border: 1px solid #ccc;">
                            <h3>${item.sector}</h3>
                            <p>涨跌幅: ${item.change_percent}%</p>
                            <p>成交量: ${item.volume}</p>
                            <p>排名: ${item.ranking}</p>
                        </div>
                    `).join('');
                    document.getElementById('dataOutput').innerHTML = output;
                })
                .catch(error => {
                    document.getElementById('dataOutput').innerHTML = 
                        `数据获取失败: ${error.message}`;
                });
        }
        
        function fetchPredictions() {
            fetch(`${API_URL}/stock/predictions`)
                .then(response => response.json())
                .then(data => {
                    const output = data.data.map(item => `
                        <div style="margin: 10px; padding: 10px; border: 1px solid #ccc;">
                            <h3>${item.sector}</h3>
                            <p>预测涨幅: ${item.predicted_change}%</p>
                            <p>信心指数: ${item.confidence}%</p>
                            <p>建议: ${item.recommendation}</p>
                            <p>理由: ${item.reason}</p>
                        </div>
                    `).join('');
                    document.getElementById('dataOutput').innerHTML = output;
                })
                .catch(error => {
                    document.getElementById('dataOutput').innerHTML = 
                        `预测获取失败: ${error.message}`;
                });
        }
        
        function fetchSuggestions() {
            fetch(`${API_URL}/stock/suggestions`)
                .then(response => response.json())
                .then(data => {
                    const output = data.data.map(item => `
                        <div style="margin: 10px; padding: 10px; border: 1px solid #ccc;">
                            <h3>${item.name} (${item.code})</h3>
                            <p>板块: ${item.sector}</p>
                            <p>价格: ${item.price}</p>
                            <p>涨跌幅: ${item.change_percent}%</p>
                            <p>评分: ${item.score}</p>
                            <p>理由: ${item.reason}</4>
                        </div>
                    `).join('');
                    document.getElementById('dataOutput').innerHTML = output;
                })
                .catch(error => {
                    document.getElementById('dataOutput').innerHTML = 
                        `建议获取失败: ${error.message}`;
                });
        }
        
        // 自动检查API状态
        checkAPI();
    </script>
</body>
</html>
